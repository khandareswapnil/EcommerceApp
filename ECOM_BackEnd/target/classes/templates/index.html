<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Page</title>
<!-- Add Bootstrap CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body>
	<section>
		<div id="carouselExampleControls" class="carousel slide"
			data-bs-ride="carousel">
			<div class="carousel-inner">
				<div class="carousel-item active">
					<img src="img/index/1.jpg" class="d-block w-100" alt="index image"
						height="400px">
				</div>
				<div class="carousel-item">
					<img src="img/index/2.jpg" class="d-block w-100" alt="index image"
						height="400px">
				</div>
				<div class="carousel-item">
					<img src="img/index/3.jpg" class="d-block w-100" alt="index image"
						height="400px">
				</div>
			</div>
			<button class="carousel-control-prev" type="button"
				data-bs-target="#carouselExampleControls" data-bs-slide="prev">
				<span class="carousel-control-prev-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Previous</span>
			</button>
			<button class="carousel-control-next" type="button"
				data-bs-target="#carouselExampleControls" data-bs-slide="next">
				<span class="carousel-control-next-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Next</span>
			</button>
		</div>

		<!-- Start Catrgory Model -->

		<div class="container">
			<div class="row">
				<p class="text-center fs-4">Category</p>
				<div class="col-md-2">
				<div class="card rounded-circle shadow-sm p-3 mb-5 bg-body rounded">
				<div class="card-body text-center">
					<img src="img/catgeory/mobile.png" width="65%" height="140px">
					<p>Mobile</p>
					</div>
				</div>
				</div>
				<div class="col-md-2">
				<div class="card rounded-circle shadow-sm p-3 mb-5 bg-body rounded">
				<div class="card-body text-center">
					<img src="img/catgeory/beauty.webp" width="65%" height="140px">
					<p>Beauty</p>
					</div>
				</div>
				</div>
				<div class="col-md-2">
				<div class="card rounded-circle shadow-sm p-3 mb-5 bg-body rounded">
				<div class="card-body text-center">
					<img src="img/catgeory/cloth.webp" width="65%" height="140px">
					<p>Mens Cloth</p>
					</div>
				</div>
				</div>
				<div class="col-md-2">
				<div class="card rounded-circle shadow-sm p-3 mb-5 bg-body rounded">
				<div class="card-body text-center">
					<img src="img/catgeory/grocessory.png" width="65%" height="140px">
					<p>Grocery</p>
					</div>
				</div>
				</div>
				<div class="col-md-2">
				<div class="card rounded-circle shadow-sm p-3 mb-5 bg-body rounded">
				<div class="card-body text-center">
					<img src="img/catgeory/clothwomen.webp" width="65%" height="140px">
					<p>Women</p>
					</div>
				</div>
				</div>
				<div class="col-md-2">
				<div class="card rounded-circle shadow-sm p-3 mb-5 bg-body rounded">
				<div class="card-body text-center">
					<img src="img/catgeory/tv.jpg" width="65%" height="140px">
					<p>TV</p>
					</div>
				</div>
				</div>
			</div>

		</div>
		<!-- End Catrgory Model -->


	</section>

	<!-- Add Bootstrap JS -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
